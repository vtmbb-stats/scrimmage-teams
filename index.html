<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VT MBB Scrimmage Teams</title>
<style>
  :root {
    color-scheme: light dark;
    --maroon: #630031;
    --orange: #CF4420;
    --bg: #f7f6f5;
    --card: #ffffff;
    --text: #1c1c1c;
    --muted: #6b6b6b;
    --border: #ddd;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #17171a;
      --card: #232327;
      --text: #f0f0f0;
      --muted: #a0a0a0;
      --border: #3a3a3f;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 1.5rem;
    max-width: 900px;
    margin-inline: auto;
  }
  h1 {
    color: var(--maroon);
    font-size: 1.5rem;
    margin-bottom: 0.25rem;
  }
  .subtitle { color: var(--muted); margin-bottom: 1.5rem; font-size: 0.9rem; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.25rem;
  }
  .card h2 {
    font-size: 1rem;
    margin: 0 0 0.75rem 0;
    color: var(--maroon);
  }
  details.card summary {
    font-size: 1rem;
    font-weight: 600;
    color: var(--maroon);
    cursor: pointer;
  }
  details.card[open] summary { margin-bottom: 0.75rem; }
  details.card .two-col { margin-top: 0.75rem; }
  textarea {
    width: 100%;
    min-height: 140px;
    font-family: inherit;
    font-size: 0.95rem;
    padding: 0.6rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    resize: vertical;
  }
  .roster-list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-top: 0.75rem;
  }
  .roster-list label {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0.3rem 0.7rem 0.3rem 0.5rem;
    font-size: 0.9rem;
    cursor: pointer;
    user-select: none;
  }
  .roster-list input { accent-color: var(--maroon); }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    align-items: end;
  }
  .field { display: flex; flex-direction: column; gap: 0.3rem; }
  .field label { font-size: 0.85rem; color: var(--muted); }
  input[type="number"] {
    width: 90px;
    padding: 0.45rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 0.95rem;
  }
  button {
    background: var(--maroon);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 0.6rem 1.1rem;
    font-size: 0.95rem;
    cursor: pointer;
    font-weight: 600;
  }
  button:hover { background: #82003f; }
  button.secondary {
    background: transparent;
    color: var(--maroon);
    border: 1px solid var(--maroon);
  }
  button.secondary:hover { background: rgba(134,31,65,0.08); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .teams-output {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 0.75rem;
    margin-top: 1rem;
  }
  .team-box {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem;
    background: var(--bg);
  }
  .team-box h3 {
    margin: 0 0 0.5rem 0;
    font-size: 0.9rem;
    color: var(--orange);
  }
  .team-box ul { margin: 0; padding-left: 1.1rem; font-size: 0.9rem; }
  .status { font-size: 0.85rem; color: var(--muted); margin-top: 0.5rem; min-height: 1.2em; }
  .history-list {
    max-height: 220px;
    overflow-y: auto;
    font-size: 0.85rem;
  }
  .history-item {
    padding: 0.4rem 0;
    border-bottom: 1px solid var(--border);
    color: var(--muted);
  }
  .history-item:last-child { border-bottom: none; }
  .history-item span.date { display: block; font-size: 0.75rem; }
  .row-actions { display: flex; gap: 0.6rem; margin-top: 0.75rem; }
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  .two-col .field-block label {
    font-size: 0.85rem;
    color: var(--muted);
    display: block;
    margin-bottom: 0.3rem;
  }
  .two-col textarea { min-height: 260px; font-size: 0.85rem; }
  .bench-tag {
    color: var(--muted);
    font-size: 0.8rem;
    font-style: italic;
  }
  .sitting-out {
    margin-top: 0.75rem;
    font-size: 0.9rem;
    color: var(--muted);
  }
  @media (max-width: 640px) {
    .two-col { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<h1>VT MBB Scrimmage Team Generator</h1>
<div class="subtitle">Randomly builds scrimmage teams from today's available players, avoiding team combinations already used.</div>

<details class="card">
  <summary>Edit roster (only needed if the roster changes)</summary>
  <div class="two-col">
    <div class="field-block">
      <label for="displayOrderInput">Roster order (how players are listed top to bottom)</label>
      <textarea id="displayOrderInput" placeholder="One player name per line"></textarea>
    </div>
    <div class="field-block">
      <label for="depthChartInput">Depth chart order (used to pick starters when a team has more than 5)</label>
      <textarea id="depthChartInput" placeholder="One player name per line"></textarea>
    </div>
  </div>
  <div class="row-actions">
    <button id="saveRosterBtn">Save Roster</button>
    <span class="status" id="rosterStatus"></span>
  </div>
</details>

<div class="card">
  <h2>Who's here today?</h2>
  <div class="roster-list" id="presentList"></div>
  <div class="row-actions">
    <button class="secondary" id="selectAllBtn">Select All</button>
    <button class="secondary" id="selectNoneBtn">Select None</button>
  </div>
</div>

<div class="card">
  <h2>Generate Teams</h2>
  <div class="controls">
    <div class="field">
      <label for="numTeams">Number of teams</label>
      <input type="number" id="numTeams" value="2" min="1">
    </div>
    <div class="field">
      <label for="teamSize">Players per team</label>
      <input type="number" id="teamSize" value="5" min="1">
    </div>
    <button id="generateBtn">Generate Teams</button>
  </div>
  <div class="status" id="generateStatus"></div>
  <div class="teams-output" id="teamsOutput"></div>
  <div class="sitting-out" id="sittingOutBox"></div>
</div>

<div class="card">
  <h2>Used Combinations (this browser)</h2>
  <div class="row-actions">
    <button class="secondary" id="clearHistoryBtn">Clear History</button>
  </div>
  <div class="history-list" id="historyList"></div>
</div>

<script>
const DISPLAY_ORDER_KEY = 'vtmbb_scrimmage_display_order';
const DEPTH_CHART_KEY = 'vtmbb_scrimmage_depth_chart';
const HISTORY_KEY = 'vtmbb_scrimmage_history';

const DEFAULT_DISPLAY_ORDER = [
  'Ben Hammond', 'Jaylen Curry', 'Ethan Copeland', 'James Caldarella',
  'Isaiah Elohim', 'Ned Hull', 'Eltayeb Eltayeb', 'Tyler Johnson',
  "Sin'Cere Jones", 'Kuol Atak', 'Amani Hansberry', 'Musa Sagnia',
  'Solomon Davis', 'Miles Heide'
];

const DEFAULT_DEPTH_CHART_ORDER = [
  'Amani Hansberry', 'Ben Hammond', 'Tyler Johnson', 'Isaiah Elohim',
  'Kuol Atak', 'Miles Heide', 'Jaylen Curry', 'Ethan Copeland',
  'Musa Sagnia', "Sin'Cere Jones", 'Solomon Davis', 'Ned Hull',
  'Eltayeb Eltayeb', 'James Caldarella'
];

function loadList(key, fallback) {
  const raw = localStorage.getItem(key);
  if (!raw) return fallback;
  try {
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) && parsed.length ? parsed : fallback;
  } catch {
    return fallback;
  }
}

function saveList(key, names) {
  localStorage.setItem(key, JSON.stringify(names));
}

function loadHistory() {
  const raw = localStorage.getItem(HISTORY_KEY);
  if (!raw) return [];
  try { return JSON.parse(raw); } catch { return []; }
}

function saveHistory(history) {
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
}

function canonicalTeam(names) {
  return [...names].sort((a, b) => a.localeCompare(b)).join('|');
}

const displayOrderInput = document.getElementById('displayOrderInput');
const depthChartInput = document.getElementById('depthChartInput');
const rosterStatus = document.getElementById('rosterStatus');
const presentList = document.getElementById('presentList');
const numTeamsInput = document.getElementById('numTeams');
const teamSizeInput = document.getElementById('teamSize');
const generateStatus = document.getElementById('generateStatus');
const teamsOutput = document.getElementById('teamsOutput');
const sittingOutBox = document.getElementById('sittingOutBox');
const historyList = document.getElementById('historyList');

let displayOrder = loadList(DISPLAY_ORDER_KEY, DEFAULT_DISPLAY_ORDER);
let depthChartOrder = loadList(DEPTH_CHART_KEY, DEFAULT_DEPTH_CHART_ORDER);
let history = loadHistory();

function renderRosterInputs() {
  displayOrderInput.value = displayOrder.join('\n');
  depthChartInput.value = depthChartOrder.join('\n');
}

function renderPresentList() {
  const previouslyChecked = new Set(
    [...presentList.querySelectorAll('input:checked')].map(el => el.value)
  );
  presentList.innerHTML = '';
  displayOrder.forEach(name => {
    const label = document.createElement('label');
    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.value = name;
    checkbox.checked = previouslyChecked.size ? previouslyChecked.has(name) : true;
    label.appendChild(checkbox);
    label.appendChild(document.createTextNode(name));
    presentList.appendChild(label);
  });
}

function renderHistory() {
  historyList.innerHTML = '';
  if (history.length === 0) {
    historyList.innerHTML = '<div class="history-item">No combinations used yet.</div>';
    return;
  }
  [...history].reverse().forEach(entry => {
    const div = document.createElement('div');
    div.className = 'history-item';
    const date = new Date(entry.timestamp).toLocaleString();
    div.innerHTML = `<span class="date">${date}</span>${entry.teams.map(t => t.join(', ')).join('  —  ')}`;
    historyList.appendChild(div);
  });
}

function parseLines(textarea) {
  return [...new Set(textarea.value.split('\n').map(n => n.trim()).filter(Boolean))];
}

document.getElementById('saveRosterBtn').addEventListener('click', () => {
  const newDisplayOrder = parseLines(displayOrderInput);
  const newDepthChartOrder = parseLines(depthChartInput);

  const displaySet = new Set(newDisplayOrder);
  const depthSet = new Set(newDepthChartOrder);
  const sameSize = displaySet.size === depthSet.size;
  const sameMembers = sameSize && [...displaySet].every(n => depthSet.has(n));

  if (!sameMembers) {
    rosterStatus.textContent = 'Roster order and depth chart order must contain the exact same players. Not saved.';
    rosterStatus.style.color = '#c0392b';
    return;
  }

  displayOrder = newDisplayOrder;
  depthChartOrder = newDepthChartOrder;
  saveList(DISPLAY_ORDER_KEY, displayOrder);
  saveList(DEPTH_CHART_KEY, depthChartOrder);
  renderPresentList();
  rosterStatus.style.color = '';
  rosterStatus.textContent = `Saved ${displayOrder.length} player(s).`;
  setTimeout(() => { rosterStatus.textContent = ''; }, 2500);
});

document.getElementById('selectAllBtn').addEventListener('click', () => {
  presentList.querySelectorAll('input').forEach(el => el.checked = true);
});

document.getElementById('selectNoneBtn').addEventListener('click', () => {
  presentList.querySelectorAll('input').forEach(el => el.checked = false);
});

document.getElementById('clearHistoryBtn').addEventListener('click', () => {
  if (!confirm('Clear all used-combination history?')) return;
  history = [];
  saveHistory(history);
  renderHistory();
});

function shuffle(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function splitIntoTeams(players, numTeams, teamSize) {
  const teams = [];
  for (let i = 0; i < numTeams; i++) {
    teams.push(players.slice(i * teamSize, (i + 1) * teamSize));
  }
  return teams;
}

function combinationUsed(teams) {
  return teams.some(team => history.some(entry =>
    entry.teams.some(usedTeam => canonicalTeam(usedTeam) === canonicalTeam(team))
  ));
}

function byOrderIndex(order) {
  return (a, b) => order.indexOf(a) - order.indexOf(b);
}

document.getElementById('generateBtn').addEventListener('click', () => {
  const present = [...presentList.querySelectorAll('input:checked')].map(el => el.value);
  const numTeams = parseInt(numTeamsInput.value, 10) || 1;
  const teamSize = parseInt(teamSizeInput.value, 10) || 5;
  const totalNeeded = numTeams * teamSize;

  if (present.length < totalNeeded) {
    generateStatus.textContent = `Need at least ${totalNeeded} players present (${numTeams} team(s) × ${teamSize}). Only ${present.length} checked.`;
    teamsOutput.innerHTML = '';
    sittingOutBox.innerHTML = '';
    return;
  }

  const MAX_ATTEMPTS = 300;
  let attempt = 0;
  let teams = null;
  let sittingOut = [];
  let repeatAvoided = true;

  while (attempt < MAX_ATTEMPTS) {
    const shuffled = shuffle(present);
    const inPlay = shuffled.slice(0, totalNeeded);
    const candidate = splitIntoTeams(inPlay, numTeams, teamSize);
    if (!combinationUsed(candidate)) {
      teams = candidate;
      sittingOut = shuffled.slice(totalNeeded);
      break;
    }
    attempt++;
  }

  if (!teams) {
    const shuffled = shuffle(present);
    teams = splitIntoTeams(shuffled.slice(0, totalNeeded), numTeams, teamSize);
    sittingOut = shuffled.slice(totalNeeded);
    repeatAvoided = false;
  }

  teamsOutput.innerHTML = '';
  teams.forEach((team, idx) => {
    const box = document.createElement('div');
    box.className = 'team-box';

    let starters = new Set(team);
    if (teamSize > 5) {
      const byDepth = [...team].sort(byOrderIndex(depthChartOrder));
      starters = new Set(byDepth.slice(0, 5));
    }

    const sortedForDisplay = [...team].sort(byOrderIndex(displayOrder));
    const items = sortedForDisplay.map(p => {
      const bench = teamSize > 5 && !starters.has(p);
      return `<li>${p}${bench ? ' <span class="bench-tag">(bench)</span>' : ''}</li>`;
    }).join('');

    box.innerHTML = `<h3>Team ${idx + 1}</h3><ul>${items}</ul>`;
    teamsOutput.appendChild(box);
  });

  sittingOutBox.innerHTML = sittingOut.length
    ? `Sitting out: ${[...sittingOut].sort(byOrderIndex(displayOrder)).join(', ')}`
    : '';

  history.push({ timestamp: Date.now(), teams });
  saveHistory(history);
  renderHistory();

  generateStatus.textContent = repeatAvoided
    ? `Generated a new combination (tried ${attempt + 1} shuffle${attempt === 0 ? '' : 's'}).`
    : `Couldn't find an unused combination after ${MAX_ATTEMPTS} tries — showing best effort. Consider clearing history or changing team settings.`;
});

renderRosterInputs();
renderPresentList();
renderHistory();
</script>

</body>
</html>
