<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VT MBB Scrimmage Teams</title>
<style>
  :root {
    color-scheme: light dark;
    --maroon: #630031;
    --orange: #CF4420;
    --bg: #f7f6f5;
    --card: #ffffff;
    --text: #1c1c1c;
    --muted: #6b6b6b;
    --border: #ddd;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #17171a;
      --card: #232327;
      --text: #f0f0f0;
      --muted: #a0a0a0;
      --border: #3a3a3f;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 1.5rem;
    max-width: 900px;
    margin-inline: auto;
  }
  h1 {
    color: var(--text);
    font-size: 1.5rem;
    margin-bottom: 0.25rem;
  }
  .subtitle { color: var(--muted); margin-bottom: 1.5rem; font-size: 0.9rem; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.25rem;
  }
  .card h2 {
    font-size: 1rem;
    margin: 0 0 0.75rem 0;
    color: var(--text);
  }
  .roster-list {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-auto-flow: column;
    gap: 0.5rem 2rem;
    margin-top: 0.75rem;
  }
  .roster-list label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.4rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.95rem;
    cursor: pointer;
    user-select: none;
  }
  .roster-list input { accent-color: var(--orange); }
  @media (max-width: 480px) {
    .roster-list { grid-template-columns: 1fr; grid-auto-flow: row; }
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    align-items: end;
  }
  .field { display: flex; flex-direction: column; gap: 0.3rem; }
  .field label { font-size: 0.85rem; color: var(--muted); }
  input[type="number"] {
    width: 90px;
    padding: 0.45rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 0.95rem;
  }
  button {
    background: var(--maroon);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 0.6rem 1.1rem;
    font-size: 0.95rem;
    cursor: pointer;
    font-weight: 600;
  }
  button:hover { background: #82003f; }
  button.secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--text);
  }
  button.secondary:hover { background: rgba(128,128,128,0.15); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .teams-output {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 0.75rem;
    margin-top: 1rem;
  }
  .team-box {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem;
    background: var(--bg);
  }
  .team-box h3 {
    margin: 0 0 0.5rem 0;
    font-size: 0.9rem;
    color: var(--orange);
  }
  .team-box ul { margin: 0; padding-left: 1.1rem; font-size: 0.9rem; }
  .status { font-size: 0.85rem; color: var(--muted); margin-top: 0.5rem; min-height: 1.2em; }
  .row-actions { display: flex; gap: 0.6rem; margin-top: 0.75rem; }
  .bench-tag {
    color: var(--muted);
    font-size: 0.8rem;
    font-style: italic;
  }
  .track-option {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 0.75rem;
    cursor: pointer;
    user-select: none;
  }
  .track-option input { accent-color: var(--orange); }
  .pair-history {
    margin-top: 1rem;
    font-size: 0.85rem;
  }
  .pair-history h4 {
    margin: 0 0 0.4rem 0;
    font-size: 0.85rem;
    color: var(--muted);
    font-weight: 600;
  }
  .pair-history ul {
    margin: 0;
    padding-left: 1.1rem;
    color: var(--muted);
  }
</style>
</head>
<body>

<h1>VT MBB Scrimmage Team Generator</h1>
<div class="subtitle">Randomly builds scrimmage teams from today's available players, avoiding team combinations already used.</div>

<div class="card">
  <h2>Who's here today?</h2>
  <div class="roster-list" id="presentList"></div>
  <div class="row-actions">
    <button class="secondary" id="selectAllBtn">Select All</button>
    <button class="secondary" id="selectNoneBtn">Select None</button>
  </div>
</div>

<div class="card">
  <h2>Generate Teams</h2>
  <div class="controls">
    <div class="field">
      <label for="numTeams">Number of teams</label>
      <input type="number" id="numTeams" value="2" min="1">
    </div>
    <div class="field">
      <label for="teamSize">Players per team</label>
      <input type="number" id="teamSize" value="5" min="1">
    </div>
    <button id="generateBtn">Generate Teams</button>
  </div>
  <div class="status" id="generateStatus"></div>
  <div class="teams-output" id="teamsOutput"></div>
  <label class="track-option" id="trackOptionRow" hidden>
    <input type="checkbox" id="trackCombinationCheckbox" checked>
    Remove this lineup from the pool (uncheck to leave it available)
  </label>
  <div class="pair-history" id="pairHistoryBox"></div>
</div>

<script>
const HISTORY_KEY = 'vtmbb_scrimmage_history';

const displayOrder = [
  'Ben Hammond', 'Jaylen Curry', 'James Caldarella', 'Ethan Copeland',
  'Isaiah Elohim', 'Ned Hull', 'Eltayeb Eltayeb', 'Tyler Johnson',
  'Kuol Atak', "Sin'Cere Jones", 'Amani Hansberry', 'Musa Sagnia',
  'Solomon Davis', 'Miles Heide'
];

const depthChartOrder = [
  'Amani Hansberry', 'Ben Hammond', 'Tyler Johnson', 'Isaiah Elohim',
  'Kuol Atak', 'Miles Heide', 'Jaylen Curry', 'Ethan Copeland',
  'Musa Sagnia', "Sin'Cere Jones", 'Solomon Davis', 'Ned Hull',
  'Eltayeb Eltayeb', 'James Caldarella'
];

// Combinations already used before this tool existed, grouped by team size.
// Add entries here (each an array of teams, each team an array of names) and
// they'll be merged in silently so the generator won't repeat them.
const SEED_HISTORY_BY_SIZE = {
  5: [],
  7: [],
};

function loadHistory() {
  const raw = localStorage.getItem(HISTORY_KEY);
  if (!raw) return [];
  try { return JSON.parse(raw); } catch { return []; }
}

function saveHistory(history) {
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
}

function canonicalTeam(names) {
  return [...names].sort((a, b) => a.localeCompare(b)).join('|');
}

function mergeSeedHistory(history) {
  let changed = false;
  Object.entries(SEED_HISTORY_BY_SIZE).forEach(([teamSize, seedTeamsList]) => {
    seedTeamsList.forEach(teams => {
      const alreadyPresent = history.some(entry =>
        entry.teamSize === Number(teamSize) &&
        entry.teams.length === teams.length &&
        entry.teams.every(t => teams.some(s => canonicalTeam(s) === canonicalTeam(t)))
      );
      if (!alreadyPresent) {
        history.push({ timestamp: Date.now(), teamSize: Number(teamSize), teams });
        changed = true;
      }
    });
  });
  if (changed) saveHistory(history);
  return history;
}

const presentList = document.getElementById('presentList');
const numTeamsInput = document.getElementById('numTeams');
const teamSizeInput = document.getElementById('teamSize');
const trackOptionRow = document.getElementById('trackOptionRow');
const trackCombinationCheckbox = document.getElementById('trackCombinationCheckbox');
const generateStatus = document.getElementById('generateStatus');
const teamsOutput = document.getElementById('teamsOutput');
const pairHistoryBox = document.getElementById('pairHistoryBox');

let history = mergeSeedHistory(loadHistory());
let lastGeneratedEntry = null;

function renderPresentList() {
  const previouslyChecked = new Set(
    [...presentList.querySelectorAll('input:checked')].map(el => el.value)
  );
  presentList.innerHTML = '';
  presentList.style.gridTemplateRows = `repeat(${Math.ceil(displayOrder.length / 2)}, auto)`;
  displayOrder.forEach(name => {
    const label = document.createElement('label');
    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.value = name;
    checkbox.checked = previouslyChecked.size ? previouslyChecked.has(name) : true;
    label.appendChild(checkbox);
    label.appendChild(document.createTextNode(name));
    presentList.appendChild(label);
  });
}

document.getElementById('selectAllBtn').addEventListener('click', () => {
  presentList.querySelectorAll('input').forEach(el => el.checked = true);
});

document.getElementById('selectNoneBtn').addEventListener('click', () => {
  presentList.querySelectorAll('input').forEach(el => el.checked = false);
});

function shuffle(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function splitIntoTeams(players, numTeams, teamSize) {
  const teams = [];
  for (let i = 0; i < numTeams; i++) {
    teams.push(players.slice(i * teamSize, (i + 1) * teamSize));
  }
  return teams;
}

// Everyone present gets placed on a team: the first numTeams*teamSize players
// fill out even teams, then anyone left over is added as an extra bench spot,
// one team at a time, so nobody is left unassigned.
function buildTeams(shuffledPresent, numTeams, teamSize) {
  const totalNeeded = numTeams * teamSize;
  const teams = splitIntoTeams(shuffledPresent.slice(0, totalNeeded), numTeams, teamSize);
  const extras = shuffledPresent.slice(totalNeeded);
  extras.forEach((player, i) => teams[i % numTeams].push(player));
  return teams;
}

function combinationUsed(teams, teamSize) {
  return teams.some(team => history.some(entry =>
    entry.teamSize === teamSize &&
    entry.teams.some(usedTeam => canonicalTeam(usedTeam) === canonicalTeam(team))
  ));
}

function byOrderIndex(order) {
  return (a, b) => order.indexOf(a) - order.indexOf(b);
}

function pairsInTeam(team) {
  const pairs = [];
  for (let i = 0; i < team.length; i++) {
    for (let j = i + 1; j < team.length; j++) {
      pairs.push([team[i], team[j]]);
    }
  }
  return pairs;
}

function pairKey(a, b) {
  return [a, b].sort((x, y) => x.localeCompare(y)).join(' & ');
}

function countPastPairOccurrences(historyEntries) {
  const counts = new Map();
  historyEntries.forEach(entry => {
    entry.teams.forEach(team => {
      pairsInTeam(team).forEach(([a, b]) => {
        const key = pairKey(a, b);
        counts.set(key, (counts.get(key) || 0) + 1);
      });
    });
  });
  return counts;
}

document.getElementById('generateBtn').addEventListener('click', () => {
  const present = [...presentList.querySelectorAll('input:checked')].map(el => el.value);
  const numTeams = parseInt(numTeamsInput.value, 10) || 1;
  const teamSize = parseInt(teamSizeInput.value, 10) || 5;
  const totalNeeded = numTeams * teamSize;

  if (present.length < totalNeeded) {
    generateStatus.textContent = `Need at least ${totalNeeded} players present (${numTeams} team(s) × ${teamSize}). Only ${present.length} checked.`;
    teamsOutput.innerHTML = '';
    return;
  }

  const pastPairCounts = countPastPairOccurrences(history);

  const MAX_ATTEMPTS = 300;
  let attempt = 0;
  let teams = null;
  let repeatAvoided = true;

  while (attempt < MAX_ATTEMPTS) {
    const candidate = buildTeams(shuffle(present), numTeams, teamSize);
    if (!combinationUsed(candidate, teamSize)) {
      teams = candidate;
      break;
    }
    attempt++;
  }

  if (!teams) {
    teams = buildTeams(shuffle(present), numTeams, teamSize);
    repeatAvoided = false;
  }

  teamsOutput.innerHTML = '';
  teams.forEach((team, idx) => {
    const box = document.createElement('div');
    box.className = 'team-box';

    let starters = new Set(team);
    if (team.length > 5) {
      const byDepth = [...team].sort(byOrderIndex(depthChartOrder));
      starters = new Set(byDepth.slice(0, 5));
    }

    const sortedForDisplay = [...team].sort(byOrderIndex(displayOrder));
    const items = sortedForDisplay.map(p => {
      const bench = team.length > 5 && !starters.has(p);
      return `<li>${p}${bench ? ' <span class="bench-tag">(bench)</span>' : ''}</li>`;
    }).join('');

    box.innerHTML = `<h3>Team ${idx + 1}</h3><ul>${items}</ul>`;
    teamsOutput.appendChild(box);
  });

  const currentPairKeys = [...new Set(teams.flatMap(pairsInTeam).map(([a, b]) => pairKey(a, b)))]
    .sort((a, b) => a.localeCompare(b));

  pairHistoryBox.innerHTML = `<h4>Pairings in this lineup</h4><ul>${
    currentPairKeys.map(key => {
      const count = (pastPairCounts.get(key) || 0) + 1;
      return `<li>${key}: ${count} time${count === 1 ? '' : 's'}</li>`;
    }).join('')
  }</ul>`;

  lastGeneratedEntry = { timestamp: Date.now(), teamSize, teams };
  trackOptionRow.hidden = false;
  trackCombinationCheckbox.checked = true;
  history.push(lastGeneratedEntry);
  saveHistory(history);

  generateStatus.textContent = repeatAvoided
    ? `Generated a new combination (tried ${attempt + 1} shuffle${attempt === 0 ? '' : 's'}).`
    : `Couldn't find an unused combination after ${MAX_ATTEMPTS} tries — showing best effort. Consider changing team settings.`;
});

trackCombinationCheckbox.addEventListener('change', () => {
  if (!lastGeneratedEntry) return;
  const idx = history.indexOf(lastGeneratedEntry);
  if (trackCombinationCheckbox.checked) {
    if (idx === -1) {
      history.push(lastGeneratedEntry);
      saveHistory(history);
    }
  } else if (idx !== -1) {
    history.splice(idx, 1);
    saveHistory(history);
  }
});

renderPresentList();
</script>

</body>
</html>
